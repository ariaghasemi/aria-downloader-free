          fi
          
          mv downloaded_file "downloads/${{ github.event.inputs.folder_name }}/${SAFE_NAME}.${EXT}"
          echo "✅ فایل 4 ذخیره شد: downloads/${{ github.event.inputs.folder_name }}/${SAFE_NAME}.${EXT}"

      - name: دانلود فایل 5
        id: download5
        if: github.event.inputs.file5_url != '' && github.event.inputs.file5_name != ''
        run: |
