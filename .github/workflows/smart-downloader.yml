name: '📦 دانلود در یک پوشه'

on:
  workflow_dispatch:
    inputs:
      folder_name:
        description: '📁 نام پوشه (اجباری)'
        required: true
        type: string
      file1_url:
        description: '🔗 فایل 1 (اجباری)'
        required: true
        type: string
      file1_name:
        description: '📛 نام فایل 1 (اجباری)'
        required: true
        type: string
      file2_url:
        description: '🔗 فایل 2 (اختیاری)'
        required: false
        type: string
      file2_name:
        description: '📛 نام فایل 2'
        required: false
        type: string
      file3_url:
        description: '🔗 فایل 3 (اختیاری)'
        required: false
        type: string
      file3_name:
        description: '📛 نام فایل 3'
        required: false
        type: string
      file4_url:
        description: '🔗 فایل 4 (اختیاری)'
        required: false
        type: string
      file4_name:
        description: '📛 نام فایل 4'
        required: false
        type: string
      file5_url:
        description: '🔗 فایل 5 (اختیاری)'
        required: false
        type: string
      file5_name:
        description: '📛 نام فایل 5'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: نصب ابزار
        run: sudo apt-get update && sudo apt-get install -y file

      - name: دانلود فایل 1
        id: download1
        run: |
          URL="${{ github.event.inputs.file1_url }}"
          echo "در حال دانلود فایل 1 از: $URL"
          curl -L --fail --retry 5 --retry-delay 5 --progress-bar -o downloaded_file "$URL"
          if [ $? -ne 0 ]; then exit 1; fi
          ls -lh downloaded_file
          
          # تشخیص نوع فایل
          USER_NAME="${{ github.event.inputs.file1_name }}"
          SAFE_NAME=$(echo "$USER_NAME" | sed 's/[\\/:*?"<>|]/_/g' | sed 's/^[._-]*//' | sed 's/[._-]*$//')
          if [ -z "$SAFE_NAME" ]; then SAFE_NAME="downloaded_file"; fi
          
          MIME=$(file -b --mime-type downloaded_file)
          EXT=$(echo "downloaded_file" | rev | cut -d. -f1 | rev | tr '[:upper:]' '[:lower:]')
          
          if [[ "$MIME" == video/* ]] || [[ "$EXT" =~ ^(mp4|mkv|avi|mov|wmv|flv|webm)$ ]]; then
            CAT="video"
          elif [[ "$MIME" == audio/* ]] || [[ "$EXT" =~ ^(mp3|wav|ogg|flac|m4a)$ ]]; then
            CAT="audio"
          elif [[ "$MIME" == image/* ]] || [[ "$EXT" =~ ^(jpg|jpeg|png|gif|bmp|webp)$ ]]; then
            CAT="image"
          elif [[ "$MIME" == application/pdf ]] || [[ "$EXT" =~ ^(pdf|doc|docx|xls|xlsx|ppt|pptx|txt)$ ]]; then
            CAT="document"
          else
            CAT="other"
          fi
          
          mkdir -p "downloads/${{ github.event.inputs.folder_name }}"
          mv downloaded_file "downloads/${{ github.event.inputs.folder_name }}/${SAFE_NAME}.${EXT}"
          echo "✅ فایل 1 ذخیره شد: downloads/${{ github.event.inputs.folder_name }}/${SAFE_NAME}.${EXT}"
          echo "CAT1=$CAT" >> $GITHUB_ENV

      - name: دانلود فایل 2
        id: download2
        if: github.event.inputs.file2_url != '' && github.event.inputs.file2_name != ''
        run: |
          URL="${{ github.event.inputs.file2_url }}"
          echo "در حال دانلود فایل 2 از: $URL"
          curl -L --fail --retry 5 --retry-delay 5 --progress-bar -o downloaded_file "$URL"
          if [ $? -ne 0 ]; then echo "⚠️ فایل 2 دانلود نشد (ادامه میدم)"; exit 0; fi
          ls -lh downloaded_file
          
          USER_NAME="${{ github.event.inputs.file2_name }}"
          SAFE_NAME=$(echo "$USER_NAME" | sed 's/[\\/:*?"<>|]/_/g' | sed 's/^[._-]*//' | sed 's/[._-]*$//')
          if [ -z "$SAFE_NAME" ]; then SAFE_NAME="downloaded_file"; fi
          
          MIME=$(file -b --mime-type downloaded_file)
