          download_file "https://www.tgxdl2.workers.dev/v3/0:/dl/932303?hash=AgADoh" "temp2"
          if [ $? -eq 0 ]; then
            MIME=$(file -b --mime-type temp2)
            EXT=$(echo "$MIME" | cut -d'/' -f2)
