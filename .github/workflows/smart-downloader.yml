permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: نصب ابزار مورد نیاز
        run: sudo apt-get update && sudo apt-get install -y file

      - name: دانلود پوشه 1 (اجباری)
        run: |
          mkdir -p "downloads/${{ github.event.inputs.folder1_name }}"
          
          # فایل 1 (اجباری)
          curl -L --fail --retry 3 -o temp_file "${{ github.event.inputs.folder1_file1_url }}"
          ext=$(file -b --mime-type temp_file | cut -d'/' -f2)
          [ "$ext" = "octet-stream" ] && ext="bin"
          mv temp_file "downloads/${{ github.event.inputs.folder1_name }}/${{ github.event.inputs.folder1_file1_name }}.$ext"
          
          # فایل 2 تا 5 (اختیاری)
          for i in 2 3 4 5; do
            url_var="folder1_file${i}_url"
            name_var="folder1_file${i}_name"
            url="${!url_var}"
            name="${!name_var}"
            if [ -n "$url" ] && [ -n "$name" ]; then
              curl -L --fail --retry 3 -o temp_file "$url"
              ext=$(file -b --mime-type temp_file | cut -d'/' -f2)
              [ "$ext" = "octet-stream" ] && ext="bin"
              mv temp_file "downloads/${{ github.event.inputs.folder1_name }}/${name}.$ext"
            fi
          done
          
          ls -lh "downloads/${{ github.event.inputs.folder1_name }}/"

      - name: دانلود پوشه 2 تا 10 (اختیاری)
        run: |
          for folder_num in 2 3 4 5 6 7 8 9 10; do
            folder_name_var="folder${folder_num}_name"
            folder_name="${!folder_name_var}"
            
            # اگر نام پوشه خالی بود، رد کن
            if [ -z "$folder_name" ]; then
              continue
            fi
            
            mkdir -p "downloads/$folder_name"
            
            # دانلود فایل‌های 1 تا 5 این پوشه
            for file_num in 1 2 3 4 5; do
              url_var="folder${folder_num}_file${file_num}_url"
              name_var="folder${folder_num}_file${file_num}_name"
              url="${!url_var}"
              name="${!name_var}"
              
              if [ -n "$url" ] && [ -n "$name" ]; then
                echo "دانلود: $folder_name / $name"
                curl -L --fail --retry 3 -o temp_file "$url"
                ext=$(file -b --mime-type temp_file | cut -d'/' -f2)
                [ "$ext" = "octet-stream" ] && ext="bin"
                mv temp_file "downloads/$folder_name/${name}.$ext"
              fi
            done
            
            ls -lh "downloads/$folder_name/"
          done

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Download files" || echo "Nothing to commit"
          git push
