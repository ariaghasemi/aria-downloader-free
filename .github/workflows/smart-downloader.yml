name: '📦 دانلود خودکار جلسات'

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: نصب ابزار
        run: sudo apt-get update && sudo apt-get install -y file

      # جلسه 2
      - name: دانلود جلسه 2
        run: |
          mkdir -p "downloads/جلسه 2"
          
          # فایل 1: جلسه 2
          echo "دانلود: جلسه 2"
          curl -L --fail --retry 20 --retry-delay 5 --progress-bar -o temp_file "https://www.tgxdl3.workers.dev/v3/0:/dl/932297?hash=AgAD7R"
          MIME=$(file -b --mime-type temp_file)
          EXT=$(echo "$MIME" | cut -d'/' -f2)
          [ "$EXT" = "octet-stream" ] && EXT="mp4"
          mv temp_file "downloads/جلسه 2/جلسه 2.$EXT"
          
          # فایل 2: جزوه 2
          echo "دانلود: جزوه 2"
          curl -L --fail --retry 20 --retry-delay 5 --progress-bar -o temp_file "https://www.tgxdl5.workers.dev/v3/0:/dl/932298?hash=AgAD6B"
          MIME=$(file -b --mime-type temp_file)
          EXT=$(echo "$MIME" | cut -d'/' -f2)
          [ "$EXT" = "octet-stream" ] && EXT="pdf"
          mv temp_file "downloads/جلسه 2/جزوه 2.$EXT"
          
          ls -lh "downloads/جلسه 2/"

      - name: کامیت جلسه 2
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/جلسه\ 2/
          git commit -m "Add: جلسه 2 (category: video+document)" || echo "Nothing to commit"
          git push

