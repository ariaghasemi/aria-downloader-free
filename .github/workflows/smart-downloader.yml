          fi
          
          mv downloaded_file "downloads/${{ github.event.inputs.folder_name }}/${SAFE_NAME}.${EXT}"
          echo "✅ فایل 5 ذخیره شد: downloads/${{ github.event.inputs.folder_name }}/${SAFE_NAME}.${EXT}"

      - name: نمایش فایل‌های دانلود شده
        run: |
          echo ""
          echo "========================================="
          echo "📁 فایل‌های موجود در downloads/${{ github.event.inputs.folder_name }}:"
          ls -lh "downloads/${{ github.event.inputs.folder_name }}/"
          echo "========================================="

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add downloaded files to ${{ github.event.inputs.folder_name }}" || echo "Nothing to commit"
          git push
