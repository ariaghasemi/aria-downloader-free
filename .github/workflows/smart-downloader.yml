name: '📦 پیشرفته: دانلود چند فایل در چند پوشه'

on:
  workflow_dispatch:
    inputs:
      folders_config:
        description: |
          📋 تنظیمات پوشه‌ها و فایل‌ها (فرمت JSON)
          
          مثال:
          {
            "پروژه_ویدیو": [
              {"url": "https://example.com/video1.mp4", "name": "intro"},
              {"url": "https://example.com/video2.mp4", "name": "main"}
            ],
            "مستندات": [
              {"url": "https://example.com/doc1.pdf", "name": "guide"},
              {"url": "https://example.com/doc2.pdf", "name": "appendix"}
            ]
          }
        required: true
        type: string

permissions:
  contents: write

jobs:
  download-multiple:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 دریافت کد مخزن
        uses: actions/checkout@v4

      - name: 📥 دانلود فایل‌ها بر اساس JSON
        run: |
          # نصب jq برای پردازش JSON
          sudo apt-get install -y jq
          
          # خواندن JSON از ورودی
          echo '${{ github.event.inputs.folders_config }}' > config.json
          
          # پردازش هر پوشه
          for folder in $(jq -r 'keys[]' config.json); do
            echo "========================================="
            echo "📁 پردازش پوشه: $folder"
            echo "========================================="
            
            # ایجاد پوشه
            mkdir -p "downloads/$folder"
            
            # تعداد فایل‌های این پوشه
            count=$(jq -r ".[\"$folder\"] | length" config.json)
            echo "📄 تعداد فایل‌ها: $count"
            
            # دانلود هر فایل
            for i in $(seq 0 $((count-1))); do
              url=$(jq -r ".[\"$folder\"][$i].url" config.json)
              name=$(jq -r ".[\"$folder\"][$i].name" config.json)
              
              echo "⬇️ دانلود: $name"
              echo "🔗 لینک: $url"
              
              # تشخیص پسوند
              curl -L --fail --retry 3 -o temp_file "$url"
              
              # بدست آوردن پسوند واقعی
              mime=$(file -b --mime-type temp_file)
              ext=""
              case "$mime" in
                video/mp4) ext="mp4" ;;
                video/x-matroska) ext="mkv" ;;
                audio/mpeg) ext="mp3" ;;
                image/jpeg) ext="jpg" ;;
                image/png) ext="png" ;;
                application/pdf) ext="pdf" ;;
                *) 
                  ext=$(echo "$url" | rev | cut -d. -f1 | rev | tr '[:upper:]' '[:lower:]')
                  if [ ${#ext} -gt 5 ]; then ext="bin"; fi
                  ;;
              esac
              
              # ذخیره با نام صحیح
              final_name="downloads/$folder/${name}.${ext}"
              mv temp_file "$final_name"
              echo "✅ ذخیره شد: $final_name"
              ls -lh "$final_name"
              echo ""
            done
          done

      - name: 📝 کامیت و پوش به مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add multiple files and folders" || echo "Nothing to commit"
          git push
