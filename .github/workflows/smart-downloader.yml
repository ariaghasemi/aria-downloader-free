name: '📦 ساده: دانلود مستقیم با فرمت اصلی'

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: '🔗 لینک مستقیم فایل'
        required: true
        type: string
      file_name:
        description: '📛 نام فایل (بدون پسوند) - مثال: MyVideo یا پروژه_مهم'
        required: true
        type: string
        default: 'downloaded_file'

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 دریافت کد مخزن
        uses: actions/checkout@v4

      - name: 📥 دانلود فایل
        id: download
        run: |
          URL="${{ github.event.inputs.file_url }}"
          echo "در حال دانلود از: $URL"
          
          # دانلود فایل با حفظ نام اصلی از لینک (اگر کاربر چیزی انتخاب نکرده)
          curl -L --fail --retry 5 --retry-delay 5 --progress-bar -o original_file "$URL"
          if [ $? -ne 0 ]; then exit 1; fi
          
          # تشخیص پسوند واقعی فایل
          MIME_TYPE=$(file -b --mime-type original_file)
          EXT=""
          
          case "$MIME_TYPE" in
            video/mp4) EXT="mp4" ;;
            video/x-matroska) EXT="mkv" ;;
            video/quicktime) EXT="mov" ;;
            video/x-msvideo) EXT="avi" ;;
            video/webm) EXT="webm" ;;
            audio/mpeg) EXT="mp3" ;;
            audio/wav) EXT="wav" ;;
            audio/ogg) EXT="ogg" ;;
            image/jpeg) EXT="jpg" ;;
            image/png) EXT="png" ;;
            image/gif) EXT="gif" ;;
            application/pdf) EXT="pdf" ;;
            text/plain) EXT="txt" ;;
            application/zip) EXT="zip" ;;
            *) 
              # تلاش برای گرفتن پسوند از URL
              EXT=$(echo "$URL" | rev | cut -d. -f1 | rev | tr '[:upper:]' '[:lower:]')
              if [ ${#EXT} -gt 5 ] || [ "$EXT" = "$URL" ]; then
                EXT="bin"
              fi
              ;;
          esac
          
          echo "EXT=$EXT" >> $GITHUB_ENV
          echo "✅ پسوند تشخیص داده شده: $EXT"

      - name: 🧠 پاکسازی نام فایل
        id: classify
        run: |
          # دریافت نام از ورودی کاربر
          USER_NAME="${{ github.event.inputs.file_name }}"
          
          # پاکسازی نام از کاراکترهای غیرمجاز
          SAFE_NAME=$(echo "$USER_NAME" | sed 's/[\\/:*?"<>|]/_/g' | sed 's/^[._-]*//' | sed 's/[._-]*$//')
          
          # اگر نام خالی شد از default استفاده کن
          if [ -z "$SAFE_NAME" ]; then
            SAFE_NAME="downloaded_file"
          fi
          
          # تشخیص دسته بر اساس پسوند
          EXT="${{ env.EXT }}"
          case "$EXT" in
            mp4|mkv|avi|mov|wmv|flv|webm) CAT="video" ;;
            mp3|wav|ogg|flac|m4a) CAT="audio" ;;
            jpg|jpeg|png|gif|bmp|webp) CAT="image" ;;
            pdf|doc|docx|xls|xlsx|ppt|pptx) CAT="document" ;;
            txt|md|json|xml|yaml) CAT="text" ;;
            zip|rar|7z|tar|gz) CAT="archive" ;;
            *) CAT="other" ;;
          esac
          
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV
          echo "CAT=$CAT" >> $GITHUB_ENV
          echo "✅ نام انتخاب شده: $SAFE_NAME"
          echo "✅ دسته: $CAT"
          echo "✅ فرمت نهایی: $SAFE_NAME.$EXT"

      - name: 💾 ذخیره فایل با فرمت اصلی
        run: |
          # پوشه نهایی: downloads/دسته/نام انتخابی.پسوند
          FINAL_DIR="downloads/${{ env.CAT }}/"
          mkdir -p "$FINAL_DIR"
          
          # نام کامل فایل با پسوند
          FINAL_FILE="$FINAL_DIR/${{ env.SAFE_NAME }}.${{ env.EXT }}"
          
          # حذف فایل قبلی در صورت وجود
          rm -f "$FINAL_FILE"
          
          # انتقال فایل دانلود شده به مقصد نهایی
          mv original_file "$FINAL_FILE"
          
          echo "✅ فایل در $FINAL_FILE ذخیره شد"
          ls -lh "$FINAL_FILE"
          
          # نمایش اطلاعات فایل
          file "$FINAL_FILE"

      - name: 📝 کامیت و پوش به مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add: ${{ env.SAFE_NAME }}.${{ env.EXT }} (category: ${{ env.CAT }})" || echo "Nothing to commit"
          git push
