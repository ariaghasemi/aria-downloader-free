name: '📦 دانلود خودکار جلسات'

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: نصب ابزار
        run: sudo apt-get update && sudo apt-get install -y file

      - name: تابع دانلود با چند سرور جایگزین
        run: |
          cat << 'EOF' > /tmp/download.sh
          #!/bin/bash
          
          download_file() {
              local url="$1"
              local output="$2"
              local retries=30
              local delay=10
              
              for i in $(seq 1 $retries); do
                  echo "تلاش $i از $retries برای دانلود..."
                  
                  curl -L --fail --max-time 300 --connect-timeout 30 \
                      -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                      -H "Accept: */*" \
                      -H "Accept-Language: en-US,en;q=0.5" \
                      -H "Accept-Encoding: gzip, deflate, br" \
                      -H "Connection: keep-alive" \
                      --progress-bar -o "$output" "$url"
                  
                  if [ $? -eq 0 ] && [ -f "$output" ] && [ $(stat -c%s "$output") -gt 1000 ]; then
                      echo "✅ دانلود موفق: $output (حجم: $(stat -c%s "$output") بایت)"
                      return 0
                  fi
                  
                  echo "⚠️ تلاش $i ناموفق بود، $delay ثانیه صبر میکنم..."
                  rm -f "$output"
                  sleep $delay
                  delay=$((delay + 5))
              done
              
              echo "❌ دانلود ناموفق بعد از $retries تلاش"
              return 1
          }
          
          export -f download_file
          EOF
          
          chmod +x /tmp/download.sh

      # جلسه 2
      - name: دانلود جلسه 2
        run: |
          source /tmp/download.sh
          mkdir -p "downloads/جلسه 2"
          
          echo "=== دانلود جلسه 2 ==="
          download_file "https://www.tgxdl3.workers.dev/v3/0:/dl/932297?hash=AgAD7R" "temp1"
          if [ $? -eq 0 ]; then
            MIME=$(file -b --mime-type temp1)
            EXT=$(echo "$MIME" | cut -d'/' -f2)
            [[ "$EXT" == "octet-stream" || -z "$EXT" ]] && EXT="mp4"
            mv temp1 "downloads/جلسه 2/جلسه 2.$EXT"
            echo "✅ جلسه 2 ذخیره شد"
          else
            echo "❌ جلسه 2 دانلود نشد"
          fi
          
          download_file "https://www.tgxdl5.workers.dev/v3/0:/dl/932298?hash=AgAD6B" "temp2"
          if [ $? -eq 0 ]; then
            MIME=$(file -b --mime-type temp2)
            EXT=$(echo "$MIME" | cut -d'/' -f2)
            [[ "$EXT" == "octet-stream" || -z "$EXT" ]] && EXT="pdf"
            mv temp2 "downloads/جلسه 2/جزوه 2.$EXT"
            echo "✅ جزوه 2 ذخیره شد"
          else
            echo "❌ جزوه 2 دانلود نشد"
          fi
          
          ls -lh "downloads/جلسه 2/" || echo "هیچ فایلی دانلود نشد"

      - name: کامیت جلسه 2
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/جلسه\ 2/ || true
          git commit -m "Add: جلسه 2" || echo "Nothing to commit"
          git push || true

      # جلسه 3
      - name: دانلود جلسه 3
        run: |
          source /tmp/download.sh
          mkdir -p "downloads/جلسه 3"
          
